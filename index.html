<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Zeiterfassung">
  <meta name="theme-color" content="#4a7c59">
  <title>Zeiterfassung Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1>Zeiterfassung</h1>
    <div class="subtitle" id="header-subtitle">Bereit</div>
  </header>

  <!-- ─── Tab: Heute ──────────────────────────────────────────────── -->
  <div id="tab-today" class="tab-content active">
    <div id="timer-section"></div>
    <div class="pausen-card">
      <h3>
        Heutige Pausen
        <button class="btn-icon" onclick="App.openAddPauseModal(DB.todayStr())">+ Hinzufügen</button>
      </h3>
      <div id="tages-pausen"><p class="no-data">Keine Pausen erfasst</p></div>
    </div>
  </div>

  <!-- ─── Tab: Kalender ──────────────────────────────────────────── -->
  <div id="tab-calendar" class="tab-content">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button class="nav-btn" onclick="Calendar.prevPeriod()">‹</button>
        <span id="cal-period-label">–</span>
        <button class="nav-btn" onclick="Calendar.nextPeriod()">›</button>
      </div>
      <button class="today-btn" onclick="Calendar.goToToday()">Heute</button>
    </div>
    <div class="view-tabs">
      <button class="view-tab active" data-view="month" onclick="Calendar.switchView('month')">Monat</button>
      <button class="view-tab" data-view="week" onclick="Calendar.switchView('week')">Woche</button>
    </div>
    <div id="calendar-container"></div>
  </div>

  <!-- ─── Tab: Einstellungen ─────────────────────────────────────── -->
  <div id="tab-settings" class="tab-content">
    <div id="settings-container"></div>
  </div>

  <!-- ─── Tab Bar ────────────────────────────────────────────────── -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="today" onclick="App.switchTab('today')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Heute
    </button>
    <button class="tab-btn" data-tab="calendar" onclick="App.switchTab('calendar')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Kalender
    </button>
    <button class="tab-btn" data-tab="settings" onclick="App.switchTab('settings')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
    </button>
  </nav>

  <div id="toast-container"></div>

  <!-- ═══════════════ MODALS ═══════════════ -->

  <!-- Tag-Detail Modal -->
  <div class="modal" id="day-detail-modal">
    <div class="modal-overlay" onclick="App.closeModal('day-detail-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="modal-day-title">Tag</h3>
        <button class="modal-close" onclick="App.closeModal('day-detail-modal')">✕</button>
      </div>
      <div class="modal-body" id="modal-day-body"></div>
    </div>
  </div>

  <!-- Eintrag bearbeiten Modal -->
  <div class="modal" id="edit-modal">
    <div class="modal-overlay" onclick="App.closeModal('edit-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="edit-modal-title">Eintrag bearbeiten</h3>
        <button class="modal-close" onclick="App.closeModal('edit-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-date">
        <div class="edit-form">

          <!-- Zeiten -->
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Arbeitsbeginn</label>
              <input type="time" class="form-input" id="edit-start" oninput="App.updateEditDiff()">
            </div>
            <div class="form-group">
              <label class="form-label">Arbeitsende</label>
              <input type="time" class="form-input" id="edit-end" oninput="App.updateEditDiff()">
            </div>
          </div>

          <!-- Sollzeit-Überschreibung -->
          <div class="form-group">
            <div class="override-toggle-row">
              <label class="form-label">Sollzeit anpassen</label>
              <div class="toggle-wrap">
                <input type="checkbox" id="edit-soll-override-check" class="toggle-input"
                       onchange="App.toggleSollOverride(this.checked)">
                <label for="edit-soll-override-check" class="toggle-label"></label>
              </div>
            </div>
            <div id="edit-soll-override-section" class="soll-override-section" style="display:none">
              <div class="time-adjuster-full">
                <button onclick="App.adjustSollOverride(-60)">−1h</button>
                <button onclick="App.adjustSollOverride(-30)">−30</button>
                <button onclick="App.adjustSollOverride(-15)">−15</button>
                <input type="number" id="edit-soll-override-val" class="soll-override-input"
                       min="0" max="900" step="5" oninput="App.updateEditDiff()">
                <span class="override-unit">Min</span>
                <button onclick="App.adjustSollOverride(15)">+15</button>
                <button onclick="App.adjustSollOverride(30)">+30</button>
                <button onclick="App.adjustSollOverride(60)">+1h</button>
              </div>
              <div class="override-hint">Sollzeit für diesen Tag individuell festlegen (z.B. 0 für Urlaub/Krank)</div>
            </div>
          </div>

          <!-- Manuelle Anpassung der Arbeitszeit (Minutenregler) -->
          <div class="form-group">
            <label class="form-label">Arbeitszeit-Anpassung
              <span class="label-hint">Rundfehler korrigieren</span>
            </label>
            <div class="anpassung-row-full">
              <button onclick="App.adjustAnpassung(-60)" class="adj-btn">−1h</button>
              <button onclick="App.adjustAnpassung(-15)" class="adj-btn">−15</button>
              <button onclick="App.adjustAnpassung(-5)"  class="adj-btn">−5</button>
              <button onclick="App.adjustAnpassung(-1)"  class="adj-btn adj-sm">−1</button>
              <span id="edit-anpassung-display" class="anp-display">+0 Min</span>
              <button onclick="App.adjustAnpassung(1)"   class="adj-btn adj-sm">+1</button>
              <button onclick="App.adjustAnpassung(5)"   class="adj-btn">+5</button>
              <button onclick="App.adjustAnpassung(15)"  class="adj-btn">+15</button>
              <button onclick="App.adjustAnpassung(60)"  class="adj-btn">+1h</button>
              <input type="hidden" id="edit-anpassung" value="0">
            </div>
          </div>

          <!-- Live Zusammenfassung -->
          <div class="edit-summary">
            <span>Soll: <strong id="edit-soll">–</strong></span>
            <span>Ist: <strong id="edit-ist">–</strong></span>
            <span id="edit-diff" class="edit-diff">–</span>
          </div>

          <!-- Kommentar mit Schnellauswahl -->
          <div class="form-group">
            <label class="form-label">Kommentar</label>
            <div class="quick-tags">
              <button class="quick-tag" data-tag="Urlaubstag"
                      onclick="App.setQuickKommentar('Urlaubstag', this)">🏖 Urlaub</button>
              <button class="quick-tag" data-tag="Krankheitstag"
                      onclick="App.setQuickKommentar('Krankheitstag', this)">🤒 Krank</button>
              <button class="quick-tag" data-tag="Homeoffice"
                      onclick="App.setQuickKommentar('Homeoffice', this)">🏠 HO</button>
              <button class="quick-tag" data-tag="Feiertag"
                      onclick="App.setQuickKommentar('Feiertag', this)">🎉 Feiertag</button>
              <button class="quick-tag" data-tag="Gleittag"
                      onclick="App.setQuickKommentar('Gleittag', this)">↕ Gleittag</button>
              <button class="quick-tag" data-tag="Dienstreise"
                      onclick="App.setQuickKommentar('Dienstreise', this)">✈ Reise</button>
            </div>
            <textarea class="form-input" id="edit-kommentar"
                      placeholder="Freitext-Kommentar…" rows="2"
                      oninput="this.closest('.form-group').querySelectorAll('.quick-tag').forEach(b=>b.classList.toggle('active', b.dataset.tag===this.value))"></textarea>
          </div>

          <button class="btn-primary btn-full" onclick="App.saveEdit()">Speichern</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pause Modal -->
  <div class="modal" id="pause-modal">
    <div class="modal-overlay" onclick="App.closeModal('pause-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="pause-modal-title">Pause</h3>
        <button class="modal-close" onclick="App.closeModal('pause-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pause-date">
        <input type="hidden" id="pause-id">
        <div class="edit-form">
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Pause Beginn</label>
              <input type="time" class="form-input" id="pause-start">
            </div>
            <div class="form-group">
              <label class="form-label">Pause Ende</label>
              <input type="time" class="form-input" id="pause-end">
            </div>
          </div>
          <button class="btn-primary btn-full" onclick="App.savePause()">Pause speichern</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CSV Export Modal -->
  <div class="modal" id="csv-export-modal">
    <div class="modal-overlay" onclick="App.closeModal('csv-export-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>CSV Export</h3>
        <button class="modal-close" onclick="App.closeModal('csv-export-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="edit-form">
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Von</label>
              <input type="date" class="form-input" id="csv-von">
            </div>
            <div class="form-group">
              <label class="form-label">Bis</label>
              <input type="date" class="form-input" id="csv-bis">
            </div>
          </div>
          <button class="btn-primary btn-full" onclick="App.doCSVExport()">📊 CSV herunterladen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Entnahme Modal -->
  <div class="modal" id="entnahme-modal">
    <div class="modal-overlay" onclick="App.closeModal('entnahme-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="entnahme-modal-title">Neue Kontobuchung</h3>
        <button class="modal-close" onclick="App.closeModal('entnahme-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="entnahme-id">
        <div class="edit-form">
          <div class="form-group">
            <label class="form-label">Datum der Buchung</label>
            <input type="date" class="form-input" id="entnahme-datum">
          </div>
          <div class="form-group">
            <label class="form-label">Konto</label>
            <div class="konto-tabs">
              <button class="konto-tab active" data-konto="sockel"
                      onclick="this.closest('.konto-tabs').querySelectorAll('.konto-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.getElementById('entnahme-konto').value=this.dataset.konto">
                Konto 1 · Sockel
              </button>
              <button class="konto-tab" data-konto="ueberSockel"
                      onclick="this.closest('.konto-tabs').querySelectorAll('.konto-tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.getElementById('entnahme-konto').value=this.dataset.konto">
                Konto 2 · Über Sockel
              </button>
            </div>
            <input type="hidden" id="entnahme-konto" value="sockel">
          </div>
          <div class="form-group">
            <label class="form-label">Betrag (Stunden:Minuten)</label>
            <div id="entnahme-drum-wrap"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Grund / Beschreibung</label>
            <textarea class="form-input" id="entnahme-grund" rows="2" placeholder="z.B. Überstundenabgeltung Q3, Arbeitgeberseitige Auszahlung…"></textarea>
          </div>
          <button class="btn-primary btn-full" onclick="Settings.saveEntnahme()">Buchung speichern</button>
        </div>
      </div>
    </div>
  </div>

  <script src="feiertage.js"></script>
  <script src="data.js"></script>
  <script src="timer.js"></script>
  <script src="calendar.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
  <script>
    // Sollzeit-Überschreibung Adjuster (in app.js scope)
    App.adjustSollOverride = function(delta) {
      const input = document.getElementById('edit-soll-override-val');
      if (!input) return;
      input.value = Math.max(0, parseInt(input.value || 0) + delta);
      App.updateEditDiff();
    };
  </script>
</body>
</html>
